<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid ">
            <a class="navbar-brand">My Dashboard</a>
            <div class="ms-auto d-flex gap-4">
                <button class="btn btn-outline-light" onclick="toggleDark()">
                    <i id="darkIcon" class="bi bi-moon"></i>
                </button>
                <button class="btn btn-danger" id="logoutBtn">
                    <span id="logoutText">Logout</span>
                    <span class="spinner-border spinner-border-sm d-none" id="logoutSpinner"></span>
                </button>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="card shadow p-5 text-center">
            <h2>Welcome to the Dashboard</h2>
            <p>You have successfully logged in.</p>
        </div>
        <div class="row mt-4">
        <div class="col-md-4">
            <div class="card p-3 shadow text-center">
                <i class="bi bi-people-fill fs-1 mb-2"></i>
                <h5>Users</h5>
                <p>120 Active</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow text-center">
                 <i class="bi bi-bar-chart-line-fill fs-1 mb-2"></i>
                <h5>Reports</h5>
                <p>35 Generated</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 shadow text-center">
                <i class="bi bi-gear-fill fs-1 mb-2"></i>
                <h5>Settings</h5>
                <p>Manage Preferences</p>
            </div>
        </div>
        </div>
    </div>

    <script>
        
        function toggleDark() {
            document.body.classList.toggle("dark-mode");
            const icon = document.getElementById("darkIcon");
            if (document.body.classList.contains("dark-mode")) {
                icon.classList.remove("bi-moon");
                icon.classList.add("bi-sun");
            } else {
                icon.classList.remove("bi-sun");
                icon.classList.add("bi-moon");
            }
        }

        const logoutBtn = document.getElementById("logoutBtn");
        const logoutText = document.getElementById("logoutText");
        const logoutSpinner = document.getElementById("logoutSpinner");
        logoutBtn.addEventListener("click", function () {
            logoutText.classList.add("d-none");
            logoutSpinner.classList.remove("d-none");
            logoutBtn.disabled = true;
            setTimeout(() => {
                window.location.href = "login.html";
            }, 800);
        });

    </script>

</body>
</html>
