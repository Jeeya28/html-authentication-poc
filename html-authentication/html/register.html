<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Create an Account</h2>
        <form action="login.html">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your Name" required><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter email address" required><br>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter phone number." required><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter strong password" required><br>
            <label for="confirm">Confirm Password:</label>
            <input type="password" id="confirm" name="confirm-password" placeholder="Enter password again" required><br>
            <button type="submit">Create Account</button>
        </form>
        <a href="login.html">Already have an account?</a>
    </div>

</body>
</html>
