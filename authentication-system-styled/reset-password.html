<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow auth-card overflow-hidden" style="max-width: 900px; width: 100%;">
      <div class="row g-0 align-items-center">

        <!-- IMAGE -->
        <div class="col-md-6 d-none d-md-block">
          <img src="https://img.freepik.com/free-vector/login-concept-illustration_114360-757.jpg"
               class="img-fluid h-100 w-100 object-fit-cover"
               alt="auth image">
        </div>

        <!-- FORM -->
        <div class="col-md-6 p-4 d-flex flex-column justify-content-center">

          <h4 class="text-center mb-4">Reset Password</h4>

          <form action="index.html">
            <div class="mb-3 position-relative">
              <label for="newPass" class="form-label">New Password</label>
              <input 
                type="password" id="newPass" class="form-control" placeholder="Enter new password" required autocomplete="new-password">
              <i class="bi bi-eye-slash toggle-password"></i>
            </div>
            <div class="mb-3 position-relative">
              <label for="confirmPass" class="form-label">Confirm Password</label>
              <input type="password" id="confirmPass" class="form-control" placeholder="Confirm new password" required autocomplete="new-password">
              <i class="bi bi-eye-slash toggle-password"></i>
              <small id="matchText" class="form-text"></small>
            </div>
            <button type="submit" class="btn btn-success w-100 loading-btn">
              <span class="btn-text">Update Password</span>
              <span class="spinner-border spinner-border-sm text-white d-none"></span>
            </button>
          </form>

          <div class="text-center mt-3 d-flex flex-column">
            <a href="index.html" class="auth-link">
              <i class="bi bi-box-arrow-in-left"></i> Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>

  document.querySelectorAll(".toggle-password").forEach(toggle => {
    toggle.addEventListener("click", () => {
      const input = toggle.previousElementSibling;
      if (input.type === "password") {
        input.type = "text";
        toggle.classList.replace("bi-eye-slash", "bi-eye");
      } else {
        input.type = "password";
        toggle.classList.replace("bi-eye", "bi-eye-slash");
      }
    });
  });

    const passInput = document.getElementById("newPass");
    const confirmInput = document.getElementById("confirmPass");
    const matchText = document.getElementById("matchText");

    confirmInput.addEventListener("input", () => {
        const match = confirmInput.value === passInput.value;
        matchText.innerText = match ? "Passwords match" : "Passwords do not match";
        matchText.style.color = match ? "green" : "red";
    });

    document.querySelector("form").addEventListener("submit", function(e) {
        if (passInput.value.length < 8) {
            e.preventDefault();
            alert("Password must be at least 8 characters long!");
            return;
        }
        if (confirmInput.value !== passInput.value) {
            e.preventDefault();
            alert("Passwords do not match!");
            return;
        }

        const btn = this.querySelector(".loading-btn");
        btn.querySelector(".btn-text").classList.add("d-none");
        btn.querySelector(".spinner-border").classList.remove("d-none");
        btn.disabled = true;
    });
  
</script>

</body>
</html>
