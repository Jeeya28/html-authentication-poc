<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg auth-card overflow-hidden" style="max-width: 900px; width: 100%;">
            <div class="row g-0">
                <!-- IMAGE -->
                <div class="col-md-6 d-none d-md-block">
                    <img src="https://img.freepik.com/free-vector/login-concept-illustration_114360-757.jpg"
                         class="img-fluid h-100 w-100 object-fit-cover"
                         alt="image">
                </div>
                <!-- FORM -->
                <div class="col-md-6 p-4">
                    <h3 class="text-center mb-5">User Login</h3>
                    <form action="dashboard.html">
                        <div class="mb-4">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" placeholder="Enter username" required>
                        </div>

                        <div class="mb-4 position-relative">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                            <i class="bi bi-eye-slash toggle-password"></i>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 loading-btn">
                            <span class="btn-text">Login</span>
                            <span class="spinner-border spinner-border-sm d-none"></span>
                        </button>
                    </form>

                    <div class="text-center mt-3 d-flex flex-column gap-2">
                        <a href="register.html" class="auth-link">
                            <i class="bi bi-person-plus"></i> Create Account
                        </a>
                        <a href="forgot-password.html" class="auth-link">
                            <i class="bi bi-key"></i> Forgot Password?
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const toggle = document.querySelector(".toggle-password");
        const password = document.querySelector("#password");
        toggle.onclick = () => {
            if (password.type === "password") {
                password.type = "text";
                toggle.classList.replace("bi-eye-slash", "bi-eye");
            } else {
                password.type = "password";
                toggle.classList.replace("bi-eye", "bi-eye-slash");
            }
        };

        document.querySelector("form").addEventListener("submit", function() {
            const btn = this.querySelector(".loading-btn");
            btn.querySelector(".btn-text").classList.add("d-none");
            btn.querySelector(".spinner-border").classList.remove("d-none");
            btn.disabled = true;
        });
    </script>
</body>
</html>
