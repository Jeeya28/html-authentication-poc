<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  
  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow auth-card overflow-hidden" style="max-width: 900px; width: 100%;">
      <div class="row g-0 align-items-center">
        <!-- IMAGE -->
        <div class="col-12 col-md-6 d-flex align-items-center">
          <img src="https://img.freepik.com/free-vector/login-concept-illustration_114360-757.jpg"
          class="img-fluid w-100 object-fit-cover"
          style="max-height: 350px;"
          alt="image">
        </div>

        <!-- FORM -->
        <div class="col-md-6 p-4 d-flex flex-column justify-content-center">
          <h4 class="text-center mb-3">Forgot Password</h4>

          <form action="reset-password.html">
            <div class="mb-3">
              <label for="emailField" class="form-label">Email</label>
              <input type="email" id="emailField" name="email" class="form-control" placeholder="Enter user email" required autocomplete="username">
            </div>

            <button type="submit" class="btn btn-warning w-100 loading-btn">
              <span class="btn-text">Send Reset Link</span>
              <span class="spinner-border spinner-border-sm text-white d-none"></span>
            </button>
          </form>

          <div class="text-center mt-3 d-flex flex-column">
            <a href="index.html" class="auth-link">
              <i class="bi bi-box-arrow-in-left"></i> Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  document.querySelector("form").addEventListener("submit", function() {
    const btn = this.querySelector(".loading-btn");
    btn.querySelector(".btn-text").classList.add("d-none");
    btn.querySelector(".spinner-border").classList.remove("d-none");
    btn.disabled = true;
  });
</script>

</body>
</html>
